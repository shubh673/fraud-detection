# Convenience wrapper for LOCAL testing:
#   docker compose up -d --build
# builds the pipeline + dashboard and serves it on
#   http://localhost/fraud-detection/
#
# The container serves the SPA under the /fraud-detection/ base path (same as
# production), so browse to the /fraud-detection/ URL, not the bare host.
# For the real deployment behind the host nginx on :7777 use
# docker-compose.prod.yml (see DEPLOY.md / NGINX-DEPLOY-GUIDE.md).
services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: fraud-dashboard:latest
    container_name: fraud-dashboard
    ports:
      - "80:8080"
    restart: unless-stopped
