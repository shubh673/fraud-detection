# Card & Payment Fraud Detection — production stack
#
#   browser ──TLS :7777──► host nginx ──/fraud-detection/──► 127.0.0.1:4779 ──► dashboard container (nginx :8080)
#
# This is a SELF-CONTAINED, static-only project: the container serves the
# prebuilt React dashboard under /fraud-detection/. There is NO backend and NO
# database. The host nginx only needs to proxy the /fraud-detection/ prefix to
# this container's loopback port (see NGINX-DEPLOY-GUIDE.md).
#
# Port assignment (project-specific; 4773 is already used by chargeback_backend):
#   4779 — dashboard (container nginx serving the SPA on :8080)

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: fraud-dashboard:latest
    container_name: fraud-dashboard
    restart: unless-stopped
    ports:
      # Loopback only — the host nginx (TLS :7777) reverse-proxies
      # /fraud-detection/ to this port. Not exposed publicly by the container.
      - "127.0.0.1:4779:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
