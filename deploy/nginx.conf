server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip static assets + JSON data
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback: React Router owns routes like /step1, /queue, /bin-attack.
    # Any unknown path serves index.html so deep links / refresh work.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # long cache for fingerprinted build assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
