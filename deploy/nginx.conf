# Container nginx for the Fraud Detection dashboard.
#
# Serves the prebuilt React SPA under the /fraud-detection/ base path on :8080.
# The host nginx (TLS :7777 on ai.arttechgroup.com) reverse-proxies the whole
# /fraud-detection/ prefix to this container's loopback port (see
# NGINX-DEPLOY-GUIDE.md). Static-only — there is no backend to proxy.
server {
    listen 8080;
    server_name _;

    # The Dockerfile copies the built SPA to /usr/share/nginx/html/fraud-detection,
    # so a request for /fraud-detection/<x> maps straight onto disk under root.
    root /usr/share/nginx/html;

    # gzip static assets + JSON data
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Container health check (used by deploy.sh and docker healthchecks).
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Redirect the bare prefix to the trailing-slash form.
    location = /fraud-detection {
        return 301 /fraud-detection/;
    }

    # long cache for fingerprinted build assets
    location /fraud-detection/assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA served under /fraud-detection/. React Router owns routes like
    # /fraud-detection/step1, /queue, /bin-attack; unknown deep links fall back
    # to the app's index.html so refresh / deep links work.
    location /fraud-detection/ {
        try_files $uri $uri/ /fraud-detection/index.html;
    }
}
